name: memroos

services:
  memroos:
    build:
      context: .
      dockerfile: docker/Dockerfile.memroos
    ports:
      - "${MEMROOS_PORT:-3000}:3000"
    environment:
      MEMROOS_A2A_PROFILE: ${MEMROOS_A2A_PROFILE:-local-dev}
      MEMROOS_PUBLIC_BASE_URL: ${MEMROOS_PUBLIC_BASE_URL:-http://localhost:3000}
      MEMROOS_A2A_ENDPOINT_BASE_URL: ${MEMROOS_A2A_ENDPOINT_BASE_URL:-http://localhost:3000}
      MEMROOS_OPERATOR_API_KEY: ${MEMROOS_OPERATOR_API_KEY:-}
      MEM0_URL: ${MEM0_URL:-http://host.docker.internal:3201}
      ORCHESTRATION_SERVICE_URL: ${ORCHESTRATION_SERVICE_URL:-}
      NEO4J_HTTP_URL: ${NEO4J_HTTP_URL:-}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      SQLITE_DB_PATH: /tmp/memroos/conversations.db
      CLAUDE_MEMORY_PATH: /tmp/memroos/claude-memory
      KNOWLEDGE_BASE_PATH: /knowledge
      MEMROOS_DATA_RESIDENCY: ${MEMROOS_DATA_RESIDENCY:-0}
      LOCAL_JUDGE_PROVIDER: ${LOCAL_JUDGE_PROVIDER:-ollama}
      LOCAL_JUDGE_ENDPOINT: ${LOCAL_JUDGE_ENDPOINT:-http://host.docker.internal:11434/v1}
      LOCAL_JUDGE_MODEL: ${LOCAL_JUDGE_MODEL:-hermes3}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
    volumes:
      - ${KNOWLEDGE_BASE_PATH:-./docs}:/knowledge:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
