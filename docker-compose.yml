name: agent-kitchen

services:
  kitchen:
    build:
      context: .
      dockerfile: docker/Dockerfile.kitchen
    ports:
      - "${KITCHEN_PORT:-3000}:3000"
    environment:
      KITCHEN_A2A_PROFILE: ${KITCHEN_A2A_PROFILE:-local-dev}
      KITCHEN_PUBLIC_BASE_URL: ${KITCHEN_PUBLIC_BASE_URL:-http://localhost:3000}
      KITCHEN_A2A_ENDPOINT_BASE_URL: ${KITCHEN_A2A_ENDPOINT_BASE_URL:-http://localhost:3000}
      KITCHEN_OPERATOR_API_KEY: ${KITCHEN_OPERATOR_API_KEY:-}
      MEM0_URL: http://mem0:3201
      ORCHESTRATION_SERVICE_URL: http://orchestration:3210
      NEO4J_HTTP_URL: http://neo4j:7474
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
      SQLITE_DB_PATH: /data/conversations.db
      CLAUDE_MEMORY_PATH: /data/claude-memory
      KNOWLEDGE_BASE_PATH: /knowledge
    volumes:
      - kitchen-data:/data
      - ${KNOWLEDGE_BASE_PATH:-./docs}:/knowledge:ro
    depends_on:
      mem0:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      orchestration:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  mem0:
    build:
      context: .
      dockerfile: docker/Dockerfile.memory
    ports:
      - "${MEM0_PORT:-3201}:3201"
    environment:
      QDRANT_URL: ${QDRANT_URL:?QDRANT_URL is required for Qdrant Cloud}
      QDRANT_API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY is required for Qdrant Cloud}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      NEO4J_HTTP_URL: http://neo4j:7474
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me}
    volumes:
      - mem0-logs:/app/services/memory/logs
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:3201/health', timeout=3)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-change-me}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10

  orchestration:
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestration
    ports:
      - "${ORCHESTRATION_PORT:-3210}:3210"
    environment:
      ORCHESTRATION_DB_PATH: /data/orchestration.db
      ORCHESTRATION_RETRY_LIMIT: ${ORCHESTRATION_RETRY_LIMIT:-2}
    volumes:
      - orchestration-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:3210/health', timeout=3)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 5

  voice:
    build:
      context: .
      dockerfile: docker/Dockerfile.voice
    ports:
      - "${VOICE_WS_PORT:-7860}:7860"
      - "${VOICE_HEALTH_PORT:-7861}:7861"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
      KITCHEN_BASE_URL: http://kitchen:3000
      VOICE_MODE: ${VOICE_MODE:-gemini}
      VOICE_WS_PORT: 7860
      VOICE_HEALTH_PORT: 7861
    healthcheck:
      test: ["CMD-SHELL", "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:7861/health', timeout=3)\nPY"]
      interval: 30s
      timeout: 5s
      retries: 5

  knowledge-mcp:
    build:
      context: .
      dockerfile: docker/Dockerfile.knowledge
    environment:
      KNOWLEDGE_ROOT: /knowledge
      MEM0_URL: http://mem0:3201
    volumes:
      - ${KNOWLEDGE_BASE_PATH:-./docs}:/knowledge
    depends_on:
      mem0:
        condition: service_healthy

volumes:
  kitchen-data:
  mem0-logs:
  neo4j-data:
  neo4j-logs:
  orchestration-data:
